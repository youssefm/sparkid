name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  checks: read
  actions: read

jobs:
  # Gate: verify CI has already passed for this commit (wait up to 5 min if in progress)
  ci-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify CI passed for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha=$(git rev-parse HEAD)
          echo "Checking Test workflow status for $sha ..."

          for i in $(seq 1 30); do
            # Query only the Test workflow's runs for this commit
            run_status=$(gh api "repos/${{ github.repository }}/actions/workflows/test.yml/runs?head_sha=${sha}&per_page=1" \
              --jq '.workflow_runs[0] // empty | {status, conclusion}')

            if [ -z "$run_status" ]; then
              if [ "$i" -eq 30 ]; then
                echo "::error::No Test workflow run found for $sha after 5 minutes"
                exit 1
              fi
              echo "  Attempt $i/30: no run found yet, waiting 10s ..."
              sleep 10
              continue
            fi

            status=$(echo "$run_status" | jq -r '.status')
            conclusion=$(echo "$run_status" | jq -r '.conclusion')
            echo "  Attempt $i/30: status=$status conclusion=$conclusion"

            if [ "$status" != "completed" ]; then
              if [ "$i" -eq 30 ]; then
                echo "::error::Test workflow still running after 5 minutes — aborting"
                exit 1
              fi
              echo "  Still running, waiting 10s ..."
              sleep 10
              continue
            fi

            if [ "$conclusion" = "success" ]; then
              echo "✅ Test workflow passed"
              exit 0
            else
              echo "::error::Test workflow finished with conclusion: $conclusion"
              exit 1
            fi
          done

  release:
    needs: ci-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so we can read current version from tags/files
          fetch-depth: 0

      # ── Calculate new version ──────────────────────────────────
      - name: Calculate version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          current=$(grep '"version"' js/package.json | head -1 | sed 's/.*"\([0-9]\+\.[0-9]\+\.[0-9]\+\)".*/\1/')
          IFS='.' read -r major minor patch <<< "$current"

          case "$BUMP" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          new="${major}.${minor}.${patch}"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "### Version bump: $current → $new ($BUMP)" >> "$GITHUB_STEP_SUMMARY"

      # ── Stamp version into all package manifests ───────────────
      - name: Stamp version in package.json
        env:
          NEW_VERSION: ${{ steps.version.outputs.new }}
        run: |
          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/" js/package.json

      - name: Stamp version in pyproject.toml
        env:
          NEW_VERSION: ${{ steps.version.outputs.new }}
        run: |
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" python/pyproject.toml

      - name: Stamp version in Cargo.toml
        env:
          NEW_VERSION: ${{ steps.version.outputs.new }}
        run: |
          # Only replace the version under [package], not under [dependencies]
          sed -i "0,/^version = \".*\"/s//version = \"$NEW_VERSION\"/" rust/Cargo.toml

      # ── Rebuild everything to verify ───────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
        working-directory: js
      - run: npm run build
        working-directory: js

      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: uv build
        working-directory: python

      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
        working-directory: rust

      # ── Commit, tag, push (dry run) ────────────────────────────
      - name: Commit, tag, push (dry run)
        env:
          NEW_VERSION: ${{ steps.version.outputs.new }}
        run: |
          echo "🏜️ DRY RUN — would commit, tag, and push:"
          echo "  git commit -m \"chore: bump version to $NEW_VERSION\""
          echo "  git tag v$NEW_VERSION"
          echo "  git push origin main"
          echo "  git push origin v$NEW_VERSION"
          echo ""
          echo "Stamped files:"
          git diff --name-only

      # ── GitHub Release (dry run) ───────────────────────────────
      - name: Create GitHub Release (dry run)
        env:
          NEW_VERSION: ${{ steps.version.outputs.new }}
        run: |
          echo "🏜️ DRY RUN — would create GitHub Release:"
          echo "  gh release create v$NEW_VERSION \\"
          echo "    --title \"v$NEW_VERSION\" \\"
          echo "    --generate-notes"

      # ── Publish: npm (dry run) ─────────────────────────────────
      - name: Publish to npm (dry run)
        run: |
          echo "🏜️ DRY RUN — would publish to npm:"
          echo "  npm publish --access public"
          npm pack --dry-run
        working-directory: js

      # ── Publish: PyPI (dry run) ────────────────────────────────
      - name: Publish to PyPI (dry run)
        run: |
          echo "🏜️ DRY RUN — would publish to PyPI:"
          echo "  uv publish"
          echo ""
          echo "Built artifacts:"
          ls -la dist/
        working-directory: python

      # ── Publish: crates.io (dry run) ───────────────────────────
      - name: Publish to crates.io (dry run)
        run: |
          echo "🏜️ DRY RUN — would publish to crates.io:"
          # --allow-dirty needed because version was stamped but not committed
          # TODO: remove --allow-dirty when commit step is live
          cargo publish --dry-run --allow-dirty 2>&1
        working-directory: rust
