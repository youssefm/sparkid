name: Release

on:
  workflow_dispatch:
    branches: [main]
    inputs:
      mode:
        description: "Release mode"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - retry

permissions:
  contents: write
  checks: read
  actions: read
  id-token: write

jobs:
  # Gate: verify CI has already passed for this commit (wait up to 5 min if in progress)
  ci-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify CI passed for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha=$(git rev-parse HEAD)
          echo "Checking Test workflow status for $sha ..."

          for i in $(seq 1 30); do
            # Query only the Test workflow's runs for this commit
            run_status=$(gh api "repos/${{ github.repository }}/actions/workflows/test.yml/runs?head_sha=${sha}&per_page=1" \
              --jq '.workflow_runs[0] // empty | {status, conclusion}')

            if [ -z "$run_status" ]; then
              if [ "$i" -eq 30 ]; then
                echo "::error::No Test workflow run found for $sha after 5 minutes"
                exit 1
              fi
              echo "  Attempt $i/30: no run found yet, waiting 10s ..."
              sleep 10
              continue
            fi

            status=$(echo "$run_status" | jq -r '.status')
            conclusion=$(echo "$run_status" | jq -r '.conclusion')
            echo "  Attempt $i/30: status=$status conclusion=$conclusion"

            if [ "$status" != "completed" ]; then
              if [ "$i" -eq 30 ]; then
                echo "::error::Test workflow still running after 5 minutes — aborting"
                exit 1
              fi
              echo "  Still running, waiting 10s ..."
              sleep 10
              continue
            fi

            if [ "$conclusion" = "success" ]; then
              echo "✅ Test workflow passed"
              exit 0
            else
              echo "::error::Test workflow finished with conclusion: $conclusion"
              exit 1
            fi
          done

  # ── Prepare: calculate version, stamp manifests, build, commit + tag ──
  prepare:
    needs: ci-check
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ── Calculate new version ──────────────────────────────────
      - name: Calculate version
        id: version
        env:
          MODE: ${{ inputs.mode }}
          GH_TOKEN: ${{ github.token }}
        run: |
          current=$(grep '"version"' js/package.json | head -1 | sed 's/.*"\([0-9]\+\.[0-9]\+\.[0-9]\+\)".*/\1/')

          if [ "$MODE" = "retry" ]; then
            # Retry: use current version from package.json (already bumped)
            if ! git ls-remote --tags origin "refs/tags/v$current" | grep -q "v$current"; then
              echo "::error::Retry failed — tag v$current does not exist"
              exit 1
            fi
            echo "🔄 Retrying release of v$current"
            echo "new=$current" >> "$GITHUB_OUTPUT"
            echo "needs_stamp=false" >> "$GITHUB_OUTPUT"
            echo "### 🔄 Retry: publishing v$current" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Normal path: bump version
          IFS='.' read -r major minor patch <<< "$current"

          case "$MODE" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          new="${major}.${minor}.${patch}"
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "needs_stamp=true" >> "$GITHUB_OUTPUT"
          echo "### Version bump: $current → $new ($MODE)" >> "$GITHUB_STEP_SUMMARY"

      # ── Stamp, build, commit, tag, push ────────────────────────
      - uses: actions/setup-node@v6
        if: steps.version.outputs.needs_stamp == 'true'
        with:
          node-version: 24
      - uses: astral-sh/setup-uv@v8.0.0
        if: steps.version.outputs.needs_stamp == 'true'
      - uses: actions/setup-python@v6
        if: steps.version.outputs.needs_stamp == 'true'
        with:
          python-version: "3.14"
      - uses: dtolnay/rust-toolchain@stable
        if: steps.version.outputs.needs_stamp == 'true'

      - name: Stamp, build, commit, tag, push
        if: steps.version.outputs.needs_stamp == 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Stamp version into all package manifests
          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/" js/package.json
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" python/pyproject.toml
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" python/Cargo.toml
          sed -i "0,/^version = \".*\"/s//version = \"$NEW_VERSION\"/" rust/Cargo.toml

          # Update lock files
          cd js && npm install --package-lock-only && cd ..
          cd python && uv lock && cd ..
          cd python && cargo generate-lockfile && cd ..
          cd rust && cargo generate-lockfile && cd ..

          # Commit, tag, push
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version to $NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin main
          git push origin "v$NEW_VERSION"
          echo "### ✅ Committed and tagged v$NEW_VERSION" >> "$GITHUB_STEP_SUMMARY"

  # ── Publish to npm (parallel) ──────────────────────────────────
  publish-npm:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.new_version }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Check if version already published to npm
        id: check
        env:
          NEW_VERSION: ${{ needs.prepare.outputs.new_version }}
        run: |
          if npm view "sparkid@$NEW_VERSION" version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ sparkid@$NEW_VERSION already exists on npm — skipping publish"
            echo "### ⏭️ npm: already published" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "📦 sparkid@$NEW_VERSION not found on npm — will publish"
          fi

      - name: Build and publish to npm
        if: steps.check.outputs.already_published == 'false'
        run: |
          cd js
          npm ci
          npm run build
          npm publish --access public
          echo "### ✅ Published sparkid@${{ needs.prepare.outputs.new_version }} to npm" >> "$GITHUB_STEP_SUMMARY"

  # ── Build Python wheels (parallel, multi-platform) ──────────────
  build-python-wheels:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: universal2-apple-darwin
          - os: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.new_version }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i 3.9 3.10 3.11 3.12 3.13 3.14
          manylinux: auto
          working-directory: python

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: python/dist

  build-python-sdist:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.new_version }}

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: python

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: python/dist

  # ── Publish to PyPI (after wheels are built) ───────────────────
  publish-pypi:
    needs: [prepare, build-python-wheels, build-python-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: astral-sh/setup-uv@v8.0.0

      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Check if version already published to PyPI
        id: check
        env:
          NEW_VERSION: ${{ needs.prepare.outputs.new_version }}
        run: |
          http_code=$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/sparkid/$NEW_VERSION/json")
          if [ "$http_code" = "200" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ sparkid $NEW_VERSION already exists on PyPI — skipping publish"
            echo "### ⏭️ PyPI: already published" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "📦 sparkid $NEW_VERSION not found on PyPI (HTTP $http_code) — will publish"
          fi

      - name: Publish to PyPI
        if: steps.check.outputs.already_published == 'false'
        run: |
          uv publish dist/*
          echo "### ✅ Published sparkid ${{ needs.prepare.outputs.new_version }} to PyPI" >> "$GITHUB_STEP_SUMMARY"

  # ── Publish to crates.io (parallel) ────────────────────────────
  publish-crates:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.new_version }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Check if version already published to crates.io
        id: check
        env:
          NEW_VERSION: ${{ needs.prepare.outputs.new_version }}
        run: |
          # Query crates.io API for this specific version
          version_exists=$(curl -s "https://crates.io/api/v1/crates/sparkid/$NEW_VERSION" \
            | jq -r '.version.num // empty')
          if [ "$version_exists" = "$NEW_VERSION" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ sparkid $NEW_VERSION already exists on crates.io — skipping publish"
            echo "### ⏭️ crates.io: already published" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "📦 sparkid $NEW_VERSION not found on crates.io — will publish"
          fi

      - name: Authenticate with crates.io
        if: steps.check.outputs.already_published == 'false'
        uses: rust-lang/crates-io-auth-action@v1
        id: crates-auth

      - name: Publish to crates.io
        if: steps.check.outputs.already_published == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: |
          cd rust
          cargo publish
          echo "### ✅ Published sparkid ${{ needs.prepare.outputs.new_version }} to crates.io" >> "$GITHUB_STEP_SUMMARY"

  # ── Create GitHub Release (after all publishes succeed) ────────
  create-release:
    needs: [publish-npm, publish-pypi, publish-crates, prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if release already exists
        id: check
        env:
          NEW_VERSION: ${{ needs.prepare.outputs.new_version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v$NEW_VERSION" &>/dev/null; then
            echo "already_exists=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ Release v$NEW_VERSION already exists — skipping creation"
            echo "### ⏭️ GitHub Release: already exists" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "already_exists=false" >> "$GITHUB_OUTPUT"
            echo "📦 Release v$NEW_VERSION does not exist — will create"
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.already_exists == 'false'
        env:
          NEW_VERSION: ${{ needs.prepare.outputs.new_version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$NEW_VERSION" \
            --title "v$NEW_VERSION" \
            --generate-notes
          echo "### ✅ Created GitHub Release v$NEW_VERSION" >> "$GITHUB_STEP_SUMMARY"
